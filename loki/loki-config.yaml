# Loki config for the Claude Code local observability stack (Docker variant).
auth_enabled: false

# Don't send anonymous usage stats to stats.grafana.org
analytics:
  reporting_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100
  grpc_listen_address: 0.0.0.0
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Cap local disk usage: events older than 30 days are deleted
compactor:
  working_directory: /loki/retention
  retention_enabled: true
  delete_request_store: filesystem

limits_config:
  retention_period: 30d

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
